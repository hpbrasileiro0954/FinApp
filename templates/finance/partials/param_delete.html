<div class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4"
     onclick="if(event.target===this) document.getElementById('modal-container').innerHTML=''">
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 w-full max-w-sm" onclick="event.stopPropagation()">
        <div class="flex items-center gap-3 mb-4">
            <div class="flex-shrink-0 w-10 h-10 rounded-full bg-red-900/50 flex items-center justify-center">
                <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>
            <h3 class="text-lg font-semibold text-white">Confirmar exclusão</h3>
        </div>
        <p class="text-gray-400 text-sm mb-6">
            Deseja excluir o parâmetro <span class="text-white font-medium">{{ param.name }}</span>?
        </p>
        <form hx-post="{% url 'finance:params_delete' param.pk %}" hx-target="#modal-container" hx-swap="innerHTML">
            {% csrf_token %}
            <div class="flex gap-3">
                <button type="submit"
                        class="flex-1 bg-red-600 hover:bg-red-700 text-white font-medium py-2 rounded-lg transition-colors">
                    Excluir
                </button>
                <button type="button"
                        onclick="document.getElementById('modal-container').innerHTML=''"
                        class="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-300 font-medium py-2 rounded-lg transition-colors">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>
