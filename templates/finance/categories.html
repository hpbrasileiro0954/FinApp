{% extends 'base_auth.html' %}
{% block title %}Categorias — Controle Financeiro{% endblock %}

{% block page_content %}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h2 class="text-xl font-semibold text-white">Categorias</h2>
        <button hx-get="{% url 'finance:categories_create' %}"
                hx-target="#modal-container" hx-swap="innerHTML"
                class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Nova
        </button>
    </div>

    <div class="flex gap-3 items-center">
        <input type="text" name="q" value="{{ q }}"
               placeholder="Pesquisar por nome, valor ou ID…"
               hx-get="{% url 'finance:categories' %}"
               hx-target="#table-container" hx-swap="innerHTML"
               hx-trigger="keyup changed delay:300ms, search"
               class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-blue-500">
        {% if per_page == 'all' %}
        <a href="{% url 'finance:categories' %}" class="text-sm text-blue-400 hover:text-blue-300 whitespace-nowrap">Paginar</a>
        {% else %}
        <a href="{% url 'finance:categories' %}?per_page=all{% if q %}&q={{ q }}{% endif %}"
           class="text-sm text-gray-400 hover:text-white whitespace-nowrap">Listar todos</a>
        {% endif %}
    </div>

    <div id="table-container">
        {% include 'finance/partials/categories_table.html' %}
    </div>
</div>
{% endblock %}
