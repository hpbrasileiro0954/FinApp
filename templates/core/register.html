{% extends 'base.html' %}
{% block title %}Registrar — Controle Financeiro{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900 px-4">
    <div class="w-full max-w-sm bg-gray-800 rounded-xl shadow-lg p-8 border border-gray-700">
        <h1 class="text-2xl font-bold text-white mb-6 text-center">Criar Conta</h1>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm text-gray-400 mb-1">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                    {% if field.value %}value="{{ field.value }}"{% endif %}
                    class="w-full bg-gray-700 border {% if field.errors %}border-red-500{% else %}border-gray-600{% endif %} rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
                {% for error in field.errors %}
                <p class="text-red-400 text-xs mt-1">{{ error }}</p>
                {% endfor %}
            </div>
            {% endfor %}

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition-colors">
                Registrar
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
            Já tem conta?
            <a href="{% url 'core:login' %}" class="text-blue-400 hover:text-blue-300">Entrar</a>
        </p>
    </div>
</div>
{% endblock %}
