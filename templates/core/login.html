{% extends 'base.html' %}
{% block title %}Login — Controle Financeiro{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900 px-4">
    <div class="w-full max-w-sm bg-gray-800 rounded-xl shadow-lg p-8 border border-gray-700">
        <h1 class="text-2xl font-bold text-white mb-6 text-center">Controle Financeiro</h1>

        {% if messages %}
        {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm {% if message.tags == 'error' %}bg-red-900/60 text-red-200 border border-red-700{% else %}bg-green-900/60 text-green-200 border border-green-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-400 mb-1">Usuário</label>
                <input type="text" name="username" autofocus required
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Senha</label>
                <input type="password" name="password" required
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition-colors">
                Entrar
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
            Não tem conta?
            <a href="{% url 'core:register' %}" class="text-blue-400 hover:text-blue-300">Registrar</a>
        </p>
    </div>
</div>
{% endblock %}
